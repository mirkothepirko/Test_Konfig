<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FLEX TABLE Konfigurator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #1a1a1a;
      color: #fff;
      padding: 12px 24px;
      font-size: 14px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    main {
      display: grid;
      grid-template-columns: 320px 1fr;
      flex: 1;
      overflow: hidden;
    }
    .panel {
      background: #fff;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow-y: auto;
      border-right: 1px solid #e0e0e0;
    }
    .panel h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: #666; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 13px; font-weight: 500; display: flex; justify-content: space-between; }
    .field label span { font-weight: 400; color: #555; }
    .field input[type=range] { width: 100%; accent-color: #1a1a1a; }
    .field input[type=number],
    .field select {
      width: 80px;
      padding: 4px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
    }
    .field select { width: 100%; background: #fff; }
    .row { display: flex; align-items: center; gap: 10px; }
    .row input[type=range] { flex: 1; }
    button {
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    #btn-configure { background: #1a1a1a; color: #fff; }
    #btn-download { background: #2d7d46; color: #fff; }
    .status-area {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 32px;
      font-size: 13px;
      color: #555;
    }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid #ccc;
      border-top-color: #1a1a1a;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner.active { display: block; }
    #status-msg.error { color: #c0392b; }
    #status-msg.success { color: #2d7d46; }
    .preview {
      background: #e8e8e8;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <header>FLEX TABLE — Konfigurator</header>
  <main>
    <div class="panel">
      <h2>Parameter</h2>

      <div class="field">
        <label>Breite <span id="lbl-breite">1200 mm</span></label>
        <div class="row">
          <input type="range" id="sl-breite" min="600" max="1800" step="10" value="1200" />
          <input type="number" id="in-breite" min="600" max="1800" step="10" value="1200" />
        </div>
      </div>

      <div class="field">
        <label>Tiefe <span id="lbl-tiefe">600 mm</span></label>
        <div class="row">
          <input type="range" id="sl-tiefe" min="400" max="900" step="10" value="600" />
          <input type="number" id="in-tiefe" min="400" max="900" step="10" value="600" />
        </div>
      </div>

      <div class="field">
        <label>Eckenradius <span id="lbl-recke">0 mm</span></label>
        <div class="row">
          <input type="range" id="sl-recke" min="0" max="50" step="1" value="0" />
          <input type="number" id="in-recke" min="0" max="50" step="1" value="0" />
        </div>
      </div>

      <div class="field">
        <label>Kantenradius <span id="lbl-rkante">0 mm</span></label>
        <div class="row">
          <input type="range" id="sl-rkante" min="0" max="5" step="0.5" value="0" />
          <input type="number" id="in-rkante" min="0" max="5" step="0.5" value="0" />
        </div>
      </div>

      <div class="field">
        <label>Variante</label>
        <select id="sl-variant"></select>
      </div>

      <div class="status-area">
        <div class="spinner" id="spinner"></div>
        <span id="status-msg">Bereit</span>
      </div>

      <button id="btn-configure">Für CNC exportieren</button>
      <button id="btn-download" disabled>STEP herunterladen</button>
    </div>

    <div class="preview" id="preview"></div>
  </main>

  <script type="importmap">
    { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js" } }
  </script>
  <script type="module">
    import * as THREE from 'three';

    // === Three.js Live-Vorschau ===
    const container = document.getElementById('preview');
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    container.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xe8e8e8);

    const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 10000);
    camera.position.set(800, 600, 1200);
    camera.lookAt(0, 0, 0);

    scene.add(new THREE.AmbientLight(0xffffff, 0.7));
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(1, 2, 1);
    scene.add(dirLight);

    const DICKE = 28.6;
    const mat = new THREE.MeshStandardMaterial({ color: 0xd4b896, roughness: 0.7 });
    const mesh = new THREE.Mesh(new THREE.BufferGeometry(), mat);

    // containerGroup rotates plate + feature markers together
    const containerGroup = new THREE.Group();
    containerGroup.add(mesh);
    const featureGroup = new THREE.Group();
    containerGroup.add(featureGroup);
    scene.add(containerGroup);

    const holeMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.6 });
    const koernungMat = new THREE.MeshStandardMaterial({ color: 0x3a3a3a, roughness: 0.7 });

    function resize() {
      const w = container.clientWidth;
      const h = container.clientHeight;
      renderer.setSize(w, h);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    }
    resize();
    window.addEventListener('resize', resize);

    function makeRoundedRect(w, d, rEcke) {
      const r = Math.max(0, Math.min(rEcke, w / 2 - 0.001, d / 2 - 0.001));
      const s = new THREE.Shape();
      const x = -w / 2, y = -d / 2;
      if (r <= 0) {
        s.moveTo(x, y);
        s.lineTo(x + w, y);
        s.lineTo(x + w, y + d);
        s.lineTo(x, y + d);
        s.lineTo(x, y);
        return s;
      }
      s.moveTo(x + r, y);
      s.lineTo(x + w - r, y);
      s.absarc(x + w - r, y + r, r, -Math.PI / 2, 0, false);
      s.lineTo(x + w, y + d - r);
      s.absarc(x + w - r, y + d - r, r, 0, Math.PI / 2, false);
      s.lineTo(x + r, y + d);
      s.absarc(x + r, y + d - r, r, Math.PI / 2, Math.PI, false);
      s.lineTo(x, y + r);
      s.absarc(x + r, y + r, r, Math.PI, Math.PI * 1.5, false);
      return s;
    }

    function buildPlateGeometry(breite, tiefe, rEcke, rKante) {
      const bevel = Math.max(0, Math.min(rKante, DICKE / 2 - 0.01));
      const depth = Math.max(DICKE - 2 * bevel, 0.001);
      const shape = makeRoundedRect(breite, tiefe, rEcke);
      const geom = new THREE.ExtrudeGeometry(shape, {
        depth,
        bevelEnabled: bevel > 0,
        bevelThickness: bevel,
        bevelSize: bevel,
        bevelOffset: 0,
        bevelSegments: 6,
        curveSegments: 32,
      });
      geom.translate(0, 0, -depth / 2);
      geom.rotateX(-Math.PI / 2);
      return geom;
    }

    function updateMesh(breite, tiefe, rEcke, rKante) {
      mesh.geometry.dispose();
      mesh.geometry = buildPlateGeometry(breite, tiefe, rEcke, rKante);
      rebuildFeatureMarkers(breite, tiefe);
    }

    // === Feature-Markers (Bohrungen / Körnungen aus features.json) ===
    let featuresData = null;   // raw features.json contents
    let variantsData = null;   // variants.json contents
    let activeVariantId = null;

    // Project a Fusion-world-XYZ into Three.js-local-XYZ for current breite/tiefe.
    // Anchors via smallest-offset-wins (robust for "X mm from edge" patterns;
    // approximate for parametric expressions like Gratnells_Mitte).
    // Three.js frame: plate on X-Z plane, thickness along +Y.
    //   Fusion X (Breite axis)  -> Three.js  X
    //   Fusion Y (Tiefe axis)   -> Three.js -Z
    //   Fusion Z (Dicke axis)   -> Three.js  Y - DICKE/2
    const ANCHOR_TOL = 1.0; // mm — below this the offsets count as "centered"
    function projectPosition(pos, currentB, currentT) {
      const off = pos.offsets;
      // X (Breite axis)
      let x;
      if (Math.abs(off.from_min_x - off.from_max_x) < ANCHOR_TOL) {
        x = 0;
      } else if (off.from_min_x <= off.from_max_x) {
        x = -currentB / 2 + off.from_min_x;
      } else {
        x = currentB / 2 - off.from_max_x;
      }
      // Y_fusion (Tiefe axis) — flips sign to Three.js Z
      let yFus;
      if (Math.abs(off.from_min_y - off.from_max_y) < ANCHOR_TOL) {
        yFus = 0;
      } else if (off.from_min_y <= off.from_max_y) {
        yFus = -currentT / 2 + off.from_min_y;
      } else {
        yFus = currentT / 2 - off.from_max_y;
      }
      const z = -yFus;
      // Y_three (thickness) — Fusion Z=0 (bottom) -> -DICKE/2; Z=DICKE -> +DICKE/2
      const y = pos.world.z - DICKE / 2;
      return { x, y, z, fromTop: off.from_max_z < off.from_min_z };
    }

    function buildHoleMarker(hole, currentB, currentT) {
      const data = hole.data;
      const diameter = data.hole_diameter_mm || 3;
      const radius = diameter / 2;
      const isKoernung = (data.extent_distance_mm != null && data.extent_distance_mm <= 1.5)
                       || data.hole_tip_angle_rad < 3.14;
      const isThrough = data.extent_type === 'adsk::fusion::AllExtentDefinition'
                      || data.extent_type === 'adsk::fusion::OneSideToExtentDefinition';
      const material = isKoernung ? koernungMat : holeMat;
      const meshes = [];
      for (const pos of data.positions) {
        const p = projectPosition(pos, currentB, currentT);
        let height, yCenter;
        if (isThrough) {
          // Through: cylinder spans full thickness + small overshoot to look pierced
          height = DICKE + 0.4;
          yCenter = 0;
        } else if (isKoernung) {
          // Körnung: tiny disc on the surface
          const depth = data.extent_distance_mm || 1;
          height = depth + 0.05;
          // From top of plate (Fusion Z = DICKE) downward, OR bottom up
          if (p.fromTop) {
            yCenter = DICKE / 2 - depth / 2;
          } else {
            yCenter = -DICKE / 2 + depth / 2;
          }
        } else {
          // Blind hole (e.g. Dekoelement, depth 16 from top)
          const depth = data.extent_distance_mm || 5;
          height = depth + 0.05;
          if (p.fromTop) {
            yCenter = DICKE / 2 - depth / 2;
          } else {
            yCenter = -DICKE / 2 + depth / 2;
          }
        }
        const geo = new THREE.CylinderGeometry(radius, radius, height, 24);
        const m = new THREE.Mesh(geo, material);
        m.position.set(p.x, yCenter, p.z);
        meshes.push(m);
      }
      return meshes;
    }

    function clearFeatureGroup() {
      while (featureGroup.children.length) {
        const child = featureGroup.children[0];
        featureGroup.remove(child);
        if (child.geometry) child.geometry.dispose();
      }
    }

    function rebuildFeatureMarkers(currentB, currentT) {
      if (!featuresData || !activeVariantId) return;
      clearFeatureGroup();
      const variant = variantsData.variants.find(v => v.id === activeVariantId);
      if (!variant) return;
      const visibleSet = new Set(variant.features);
      for (const hole of featuresData.holes) {
        if (!visibleSet.has(hole.name)) continue;
        if (!hole.data || !hole.data.positions) continue;
        for (const m of buildHoleMarker(hole, currentB, currentT)) {
          featureGroup.add(m);
        }
      }
    }

    async function loadFeatures() {
      try {
        const res = await fetch(`${API}/features`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const json = await res.json();
        featuresData = json.features;
        variantsData = json.variants;
        // Populate variant dropdown
        const sel = document.getElementById('sl-variant');
        sel.innerHTML = '';
        for (const v of variantsData.variants) {
          const opt = document.createElement('option');
          opt.value = v.id;
          opt.textContent = v.label;
          sel.appendChild(opt);
        }
        activeVariantId = variantsData.default_variant || (variantsData.variants[0] && variantsData.variants[0].id);
        if (activeVariantId) sel.value = activeVariantId;
        sel.addEventListener('change', () => {
          activeVariantId = sel.value;
          rebuildFeatureMarkers(
            parseFloat(document.getElementById('sl-breite').value),
            parseFloat(document.getElementById('sl-tiefe').value),
          );
        });
        rebuildFeatureMarkers(
          parseFloat(document.getElementById('sl-breite').value),
          parseFloat(document.getElementById('sl-tiefe').value),
        );
      } catch (e) {
        console.warn('Konnte features nicht laden:', e.message);
      }
    }

    function animate() {
      requestAnimationFrame(animate);
      containerGroup.rotation.y += 0.003;
      renderer.render(scene, camera);
    }
    animate();

    // === Parameter-Kopplung ===
    function linkParam(slId, inId, lblId) {
      const sl = document.getElementById(slId);
      const inp = document.getElementById(inId);
      const lbl = document.getElementById(lblId);

      function sync(val) {
        sl.value = val;
        inp.value = val;
        lbl.textContent = val + ' mm';
        updateMesh(
          parseFloat(document.getElementById('sl-breite').value),
          parseFloat(document.getElementById('sl-tiefe').value),
          parseFloat(document.getElementById('sl-recke').value),
          parseFloat(document.getElementById('sl-rkante').value),
        );
      }
      sl.addEventListener('input', () => sync(sl.value));
      inp.addEventListener('change', () => {
        const clamped = Math.min(Math.max(parseFloat(inp.value), parseFloat(inp.min)), parseFloat(inp.max));
        sync(clamped);
      });
    }

    // === API-Calls ===
    const API = 'http://localhost:8000';

    linkParam('sl-breite', 'in-breite', 'lbl-breite');
    linkParam('sl-tiefe', 'in-tiefe', 'lbl-tiefe');
    linkParam('sl-recke', 'in-recke', 'lbl-recke');
    linkParam('sl-rkante', 'in-rkante', 'lbl-rkante');
    updateMesh(1200, 600, 0, 0);
    loadFeatures();
    let currentWorkItemId = null;
    let pollInterval = null;

    const btnConfigure = document.getElementById('btn-configure');
    const btnDownload = document.getElementById('btn-download');
    const spinner = document.getElementById('spinner');
    const statusMsg = document.getElementById('status-msg');

    function setStatus(text, cls) {
      statusMsg.textContent = text;
      statusMsg.className = cls || '';
    }

    btnConfigure.addEventListener('click', async () => {
      clearInterval(pollInterval);
      btnDownload.disabled = true;
      btnConfigure.disabled = true;
      spinner.classList.add('active');
      setStatus('Wird verarbeitet…');

      const params = {
        breite: parseFloat(document.getElementById('sl-breite').value),
        tiefe: parseFloat(document.getElementById('sl-tiefe').value),
        r_ecke: parseFloat(document.getElementById('sl-recke').value),
        r_kante: parseFloat(document.getElementById('sl-rkante').value),
        variant: activeVariantId,
      };

      try {
        const res = await fetch(`${API}/configure`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(params),
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        currentWorkItemId = data.workItemId;
        pollStatus();
      } catch (e) {
        spinner.classList.remove('active');
        btnConfigure.disabled = false;
        setStatus('Fehler: ' + e.message, 'error');
      }
    });

    function pollStatus() {
      pollInterval = setInterval(async () => {
        try {
          const res = await fetch(`${API}/status/${currentWorkItemId}`);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const { status } = await res.json();

          const s = (status || '').toLowerCase();
          if (s === 'success' || s === 'succeeded') {
            clearInterval(pollInterval);
            spinner.classList.remove('active');
            btnConfigure.disabled = false;
            btnDownload.disabled = false;
            setStatus('Fertig — STEP bereit.', 'success');
          } else if (s.startsWith('failed') || s === 'cancelled') {
            clearInterval(pollInterval);
            spinner.classList.remove('active');
            btnConfigure.disabled = false;
            setStatus(`Fehler bei der Verarbeitung (${status}).`, 'error');
          }
          // pending / inprogress → weiter pollen
        } catch (e) {
          clearInterval(pollInterval);
          spinner.classList.remove('active');
          btnConfigure.disabled = false;
          setStatus('Polling-Fehler: ' + e.message, 'error');
        }
      }, 2000);
    }

    btnDownload.addEventListener('click', async () => {
      if (!currentWorkItemId) return;
      const res = await fetch(`${API}/download/${currentWorkItemId}`);
      if (!res.ok) { setStatus('Download fehlgeschlagen.', 'error'); return; }
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `flex_${currentWorkItemId}.step`;
      a.click();
      URL.revokeObjectURL(url);
    });
  </script>
</body>
</html>
